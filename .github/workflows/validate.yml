# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install newman
        run: npm install -g newman

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          java-version-file: ".java-version"
          distribution: "temurin"
          cache: maven

      - name: Maven verify
        run: ./mvnw -B clean verify -fae -T 1C

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: target/site/jacoco-aggregate/jacoco.xml
  update-dependency-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          java-version-file: ".java-version"
          distribution: "temurin"
          cache: maven

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5.0.0
  flowable-engine-integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install newman
        run: npm install -g newman

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          java-version-file: ".java-version"
          distribution: "temurin"
          cache: maven

      - name: Run flowable-engine in the background
        run: |
          mvn -B spring-boot:run -Dspring-boot.run.profiles=local -pl flowable-engine -am > flowable-engine-${{ github.run_id }}.log 2>&1 &
          echo $! > flowable-engine.pid

      - name: Wait for flowable-engine readiness
        run: |
          echo "Waiting for flowable-engine..."
          for i in {1..60}; do
            if curl -sf http://localhost:5367/actuator/health | grep -q '"status":"UP"'; then
              echo "flowable-engine is up!"
              exit 0
            fi
            PID=$(cat flowable-engine.pid)
            if ! kill -0 $PID 2>/dev/null; then
              echo "flowable-engine process died"
              exit 1
            fi
            sleep 2
          done
          echo "flowable-engine failed to start"
          exit 1

      - name: Run flowable-engine integration tests with newman
        run: newman run ./newman/flowable-engine.postman_collection.json -e ./newman/flowable-engine-local.postman_environment.json

      - name: Shut down flowable-engine
        if: always()
        run: |
          if [ -f flowable-engine.pid ]; then
              kill $(cat flowable-engine.pid) || echo "Process already terminated"
              rm flowable-engine.pid
          fi

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "==== START FLOWABLE-ENGINE LOG ===="
          cat flowable-engine-${{ github.run_id }}.log || true
          echo "==== END FLOWABLE-ENGINE LOG ===="
  gateway-integration-test:
