# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node and java
        uses: ./.github/actions/setup-node-java

      - name: Maven verify
        run: ./mvnw -B clean verify -fae -T 1C

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: target/site/jacoco-aggregate/jacoco.xml
  validate-ports:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: ./.github/actions/setup-node

      - name: Check generated port config
        run: node scripts/sync-ports.mjs --check
  update-dependency-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup java
        uses: ./.github/actions/setup-java

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5.0.0
  dual-datasources-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: apps/dual-datasources
      port: 7915
      collection: ./newman/dual-datasources.postman_collection.json
      environment: ./newman/dual-datasources-local.postman_environment.json
  flowable-engine-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: apps/flowable-engine
      port: 5367
      collection: ./newman/flowable-engine.postman_collection.json
      environment: ./newman/flowable-engine-local.postman_environment.json
  gateway-integration-test:
    needs: oauth2-authorization-server-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: apps/oauth2-authorization-server
      port_a: 9562
      module_b: apps/gateway
      port_b: 9203
      collection: ./newman/gateway.postman_collection.json
      environment: ./newman/gateway-local.postman_environment.json
  mysql-migrations-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: data/mysql-migrations
      port: 5368
      collection: ./newman/mysql-migrations.postman_collection.json
      environment: ./newman/mysql-migrations-local.postman_environment.json
  oauth2-authorization-server-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: apps/oauth2-authorization-server
      port: 9562
      collection: ./newman/oauth2-authorization-server.postman_collection.json
      environment: ./newman/oauth2-authorization-server-local.postman_environment.json
      newman_args: '--env-var "CI=true"'
  oauth2-authorization-server-opaque-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: apps/oauth2-authorization-server-opaque
      port: 9563
      collection: ./newman/oauth2-authorization-server-opaque.postman_collection.json
      environment: ./newman/oauth2-authorization-server-opaque-local.postman_environment.json
  spring-security-integration-test:
    needs: oauth2-authorization-server-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: apps/oauth2-authorization-server
      port_a: 9562
      module_b: apps/spring-security
      port_b: 9054
      collection: ./newman/spring-security.postman_collection.json
      environment: ./newman/spring-security-local.postman_environment.json
  spring-security-opaque-integration-test:
    needs: oauth2-authorization-server-opaque-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: apps/oauth2-authorization-server-opaque
      port_a: 9563
      module_b: apps/spring-security-opaque
      port_b: 9055
      collection: ./newman/spring-security-opaque.postman_collection.json
      environment: ./newman/spring-security-opaque-local.postman_environment.json
  spring-security-reactive-integration-test:
    needs: oauth2-authorization-server-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: apps/oauth2-authorization-server
      port_a: 9562
      module_b: apps/spring-security-reactive
      port_b: 9373
      collection: ./newman/spring-security-reactive.postman_collection.json
      environment: ./newman/spring-security-reactive-local.postman_environment.json
  spring-security-reactive-opaque-integration-test:
    needs: oauth2-authorization-server-opaque-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: apps/oauth2-authorization-server-opaque
      port_a: 9563
      module_b: apps/spring-security-reactive-opaque
      port_b: 9378
      collection: ./newman/spring-security-reactive-opaque.postman_collection.json
      environment: ./newman/spring-security-reactive-opaque-local.postman_environment.json
  template-servlet-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: templates/template-servlet
      port: 6058
      collection: ./newman/template-servlet.postman_collection.json
      environment: ./newman/template-servlet-local.postman_environment.json
  template-reactive-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: templates/template-reactive
      port: 6059
      collection: ./newman/template-reactive.postman_collection.json
      environment: ./newman/template-reactive-local.postman_environment.json
  todo-app-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: apps/todo-app
      port: 6958
      collection: ./newman/todo-app.postman_collection.json
      environment: ./newman/todo-app-local.postman_environment.json
