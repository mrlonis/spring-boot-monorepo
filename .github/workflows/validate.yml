# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node and java
        uses: ./.github/actions/setup-node-java

      - name: Maven verify
        run: ./mvnw -B clean verify -fae -T 1C

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: target/site/jacoco-aggregate/jacoco.xml
  update-dependency-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          java-version-file: ".java-version"
          distribution: "temurin"
          cache: maven

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5.0.0
  flowable-engine-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: flowable-engine
      port: 5367
      collection: ./newman/flowable-engine.postman_collection.json
      environment: ./newman/flowable-engine-local.postman_environment.json
  gateway-integration-test:
    needs: oauth2-authorization-server-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: oauth2-authorization-server
      port_a: 9562
      module_b: gateway
      port_b: 9203
      collection: ./newman/gateway.postman_collection.json
      environment: ./newman/gateway-local.postman_environment.json
  mysql-migrations-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: mysql-migrations
      port: 5368
      collection: ./newman/mysql-migrations.postman_collection.json
      environment: ./newman/mysql-migrations-local.postman_environment.json
  oauth2-authorization-server-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: oauth2-authorization-server
      port: 9562
      collection: ./newman/oauth2-authorization-server.postman_collection.json
      environment: ./newman/oauth2-authorization-server-local.postman_environment.json
  oauth2-authorization-server-opaque-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: oauth2-authorization-server-opaque
      port: 9563
      collection: ./newman/oauth2-authorization-server-opaque.postman_collection.json
      environment: ./newman/oauth2-authorization-server-opaque-local.postman_environment.json
  spring-security-integration-test:
    needs: oauth2-authorization-server-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: oauth2-authorization-server
      port_a: 9562
      module_b: spring-security
      port_b: 9054
      collection: ./newman/spring-security.postman_collection.json
      environment: ./newman/spring-security-local.postman_environment.json
  spring-security-opaque-integration-test:
    needs: oauth2-authorization-server-opaque-integration-test
    uses: ./.github/workflows/reusable-two-service-newman.yml
    with:
      module_a: oauth2-authorization-server-opaque
      port_a: 9563
      module_b: spring-security-opaque
      port_b: 9055
      collection: ./newman/spring-security-opaque.postman_collection.json
      environment: ./newman/spring-security-opaque-local.postman_environment.json
  spring-security-reactive-integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: oauth2-authorization-server-integration-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node, java, and newman
        uses: ./.github/actions/setup-node-java-newman

      - name: Start oauth2-authorization-server
        id: oauth2-authorization-server
        uses: ./.github/actions/run-spring-service
        with:
          module: oauth2-authorization-server
          port: 9562

      - name: Start spring-security-reactive
        id: spring-security-reactive
        uses: ./.github/actions/run-spring-service
        with:
          module: spring-security-reactive
          port: 9373

      - name: Run newman
        run: newman run ./newman/spring-security-reactive.postman_collection.json -e ./newman/spring-security-reactive-local.postman_environment.json

      - name: Shut down spring-security-reactive
        if: always()
        uses: ./.github/actions/stop-spring-service
        with:
          pid: ${{ steps.spring-security-reactive.outputs.pid }}

      - name: Shut down oauth2-authorization-server
        if: always()
        uses: ./.github/actions/stop-spring-service
        with:
          pid: ${{ steps.oauth2-authorization-server.outputs.pid }}

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "==== START SPRING-SECURITY-REACTIVE LOG ===="
          cat ${{ steps.spring-security-reactive.outputs.log_file }} || true
          echo "==== END SPRING-SECURITY-REACTIVE LOG ===="
          echo "==== START OAUTH2-AUTHORIZATION-SERVER LOG ===="
          cat ${{ steps.oauth2-authorization-server.outputs.log_file }} || true
          echo "==== END OAUTH2-AUTHORIZATION-SERVER LOG ===="
  todo-app-integration-test:
    uses: ./.github/workflows/reusable-single-service-newman.yml
    with:
      module: todo-app
      port: 6958
      collection: ./newman/todo-app.postman_collection.json
      environment: ./newman/todo-app-local.postman_environment.json
