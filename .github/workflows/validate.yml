          java-version-file: ".java-version"
          distribution: "temurin"
          cache: maven

      - name: Run oauth2-authorization-server in the background
        run: |
          mvn -B spring-boot:run -Dspring-boot.run.profiles=local -pl oauth2-authorization-server -am > oauth2-authorization-server-${{ github.run_id }}.log 2>&1 &
          echo $! > oauth2-authorization-server.pid

      - name: Wait for oauth2-authorization-server readiness
        run: |
          echo "Waiting for oauth2-authorization-server..."
          for i in {1..60}; do
            if curl -sf http://localhost:9562/actuator/health | grep -q '"status":"UP"'; then
              echo "oauth2-authorization-server is up!"
              exit 0
            fi
            PID=$(cat oauth2-authorization-server.pid)
            if ! kill -0 $PID 2>/dev/null; then
              echo "oauth2-authorization-server process died"
              exit 1
            fi
            sleep 2
          done
          echo "oauth2-authorization-server failed to start"
          exit 1

      - name: Run gateway in the background
        run: |
          mvn -B spring-boot:run -Dspring-boot.run.profiles=local -pl gateway -am > gateway-${{ github.run_id }}.log 2>&1 &
          echo $! > gateway.pid

      - name: Wait for gateway readiness
        run: |
          echo "Waiting for gateway..."
          for i in {1..60}; do
            if curl -sf http://localhost:9203/actuator/health | grep -q '"status":"UP"'; then
              echo "Gateway is up!"
              exit 0
            fi
            PID=$(cat gateway.pid)
            if ! kill -0 $PID 2>/dev/null; then
              echo "Gateway process died"
              exit 1
            fi
            sleep 2
          done
          echo "Gateway failed to start"
          exit 1

      - name: Run newman
        run: newman run ./newman/gateway.postman_collection.json -e ./newman/gateway-local.postman_environment.json

      - name: Shut down services
        if: always()
        run: |
          if [ -f gateway.pid ]; then
            kill $(cat gateway.pid) || echo "Process already terminated"
            rm gateway.pid
          fi
          if [ -f oauth2-authorization-server.pid ]; then
            kill $(cat oauth2-authorization-server.pid) || echo "Process already terminated"
            rm oauth2-authorization-server.pid
          fi

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "==== START GATEWAY LOG ===="
          cat gateway-${{ github.run_id }}.log || true
          echo "==== END GATEWAY LOG ===="
          echo "==== START AUTH SERVER LOG ===="
          cat oauth2-authorization-server-${{ github.run_id }}.log || true
          echo "==== END AUTH SERVER LOG ===="
