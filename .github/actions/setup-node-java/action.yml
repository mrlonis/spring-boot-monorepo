name: "Setup Node and Java"
description: "Checks out the repo and installs Node and Java"

runs:
  using: "composite"
  steps:
    - name: Checkout repository and setup node
      uses: ./.github/actions/setup-node

    - name: Setup java
      uses: actions/setup-java@v5
      with:
        java-version-file: ".java-version"
        distribution: "temurin"
        cache: maven
